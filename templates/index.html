<!DOCTYPE html>
<html>
<head>
    <title>Wearable Data Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Wearable Dataset Explorer</h2>
    <form method="POST" class="row g-3 mb-4">
        <div class="col-md-3">
            <label>Activity</label>
            <select name="activity" class="form-select">
                {% for act in data_map.keys() %}
                <option value="{{ act }}">{{ act }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3">
            <label>Subject</label>
            <input type="text" name="subject" class="form-control" placeholder="e.g. f01">
        </div>
        <div class="col-md-3">
            <label>Metric</label>
            <select name="metric" class="form-select">
                <option value="ACC">ACC</option>
                <option value="BVP">BVP</option>
                <option value="HR">HR</option>
                <option value="TEMP">TEMP</option>
            </select>
        </div>
        <div class="col-md-3 align-self-end">
            <button type="submit" class="btn btn-primary w-100">Load Data</button>
        </div>
    </form>

    <hr>

    {% if tables %}
        <h3>Preview: {{ selected.activity }} - {{ selected.subject }} ({{ selected.metric }})</h3>
        <div class="table-responsive">
            {{ tables|safe }}
        </div>
    {% endif %}
</body>
</html>
